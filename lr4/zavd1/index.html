<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Card</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="card">
            <img src="tablet.jpg" alt="Tablet" class="product-img">
            <div class="product-info">
                <h3 class="product-name">Samsung Galaxy Tab S9</h3>
                <p class="property">Діагональ: 11 дюймів</p>
                <p class="property">Роздільна здатність: 2560x1600</p>
                <p class="property">Вбудована пам'ять: 128 ГБ</p>
                <p class="property">Ємність батареї: 8000 мАг</p>
            </div>
            <div class="buttons">
                <button class="btn-edit">Edit</button>
                <button class="btn-delete">Delete</button>
            </div>
        </div>
    </div>
</body>
</html>
