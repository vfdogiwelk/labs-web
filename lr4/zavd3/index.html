<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="main-image">
            <img src="../images/big_picture_1.jpg" alt="Image 1" id="img1">
            <img src="../images/big_picture_2.jpg" alt="Image 2" id="img2">
            <img src="../images/big_picture_3.jpg" alt="Image 3" id="img3">
            <img src="../images/big_picture_4.jpg" alt="Image 4" id="img4">
            <img src="../images/big_picture_5.jpg" alt="Image 5" id="img5">
        </div>
        <div class="thumbnails">
            <a href="#img1"><img src="../images/small_picture_1.jpg" alt="Thumb 1"></a>
            <a href="#img2"><img src="../images/small_picture_2.jpg" alt="Thumb 2"></a>
            <a href="#img3"><img src="../images/small_picture_3.jpg" alt="Thumb 3"></a>
            <a href="#img4"><img src="../images/small_picture_4.jpg" alt="Thumb 4"></a>
            <a href="#img5"><img src="../images/small_picture_5.jpg" alt="Thumb 5"></a>
        </div>
    </div>
</body>
</html>
