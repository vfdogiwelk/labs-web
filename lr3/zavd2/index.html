<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Таблиці</title>
    <link rel="stylesheet" href="style2.css">
</head>
<body>
    <table class="schedule">
        <caption>Розклад занять</caption>
        <thead>
            <tr>
                <th rowspan="2">День тижня</th>
                <th rowspan="2">Пара (№)</th>
                <th rowspan="2">Час (пари)</th>
                <th colspan="2">Марцюк О.В<br>КІ-406</th>
                <th colspan="2">Ауд (І)</th>
                <th colspan="2">Ауд (ІІ)</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td rowspan="7" class="day-column">Ч<br>Е<br>Т<br>В<br>Е<br>Р</td>
                <td>I</td>
                <td>8:10-9:20</td>
                <td colspan="2"></td>
                <td colspan="2"></td>
                <td colspan="2"></td>
            </tr>
            <tr>
                <td>II</td>
                <td>9:20-10:50</td>
                <td colspan="2">ООП<br>Слободян</td>
                <td colspan="2">101</td>
                <td colspan="2">213в</td>
            </tr>
            <tr>
                <td>III</td>
                <td>10:50-12:30</td>
                <td colspan="2">Web програмування<br>Лісовий</td>
                <td colspan="2">101</td>
                <td colspan="2"></td>
            </tr>
            <tr>
                <td>IV</td>
                <td>12:40-14:00</td>
                <td colspan="2">Математика<br>Кметь</td>
                <td colspan="2">314в</td>
                <td colspan="2"></td>
            </tr>
        </tbody>
    </table>
</body>
</html>
