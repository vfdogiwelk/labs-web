<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Форма кредитної картки</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Форма оплати</h1>

    <div class="card-form">
        <div class="form-group">
            <label for="card-number">Номер картки</label>
            <input type="text" id="card-number" placeholder="1234 5678 9012 3456" maxlength="19" required>
        </div>

        <div class="form-group">
            <label for="card-name">Ім'я власника</label>
            <input type="text" id="card-name" placeholder="ILLIA IVANYNA" required>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="card-expiry">Термін дії</label>
                <input type="text" id="card-expiry" placeholder="MM/YY" maxlength="5" required>
            </div>
            <div class="form-group">
                <label for="card-cvv">CVV/CVN</label>
                <input type="password" id="card-cvv" placeholder="***" maxlength="4" required>
            </div>
        </div>

        <button type="submit" class="btn-pay">Оплатити</button>
    </div>
</body>
</html>
