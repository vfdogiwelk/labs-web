<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Завдання 3 - Форма реєстрації</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Форма реєстрації</h1>

    <form class="reg-form" action="#" method="post">

        <div class="form-block">
            <h2 class="block-title">Реєстраційні дані</h2>

            <div class="input-group">
                <label for="login">Логін</label>
                <div class="input-icon">
                    <img src="../icons/username.png" alt="username">
                    <input type="text" id="login" name="login" placeholder="Введіть логін">
                </div>
            </div>

            <div class="input-group">
                <label for="email">Електронна пошта</label>
                <div class="input-icon">
                    <img src="../icons/email.png" alt="email">
                    <input type="email" id="email" name="email" placeholder="example@mail.com">
                </div>
            </div>

            <div class="input-group">
                <label for="password">Пароль</label>
                <div class="input-icon">
                    <img src="../icons/pswd.png" alt="password">
                    <input type="password" id="password" name="password" placeholder="Введіть пароль">
                </div>
            </div>

            <div class="input-group">
                <label for="password-confirm">Підтвердження пароля</label>
                <div class="input-icon">
                    <img src="../icons/pswd.png" alt="password">
                    <input type="password" id="password-confirm" name="password_confirm" placeholder="Повторіть пароль">
                </div>
            </div>
        </div>

        <div class="form-block">
            <h2 class="block-title">Персональні дані</h2>

            <div class="input-group">
                <label for="firstname">Ім'я</label>
                <div class="input-icon">
                    <img src="../icons/username.png" alt="name">
                    <input type="text" id="firstname" name="firstname" placeholder="Ілля">
                </div>
            </div>

            <div class="input-group">
                <label for="lastname">Прізвище</label>
                <div class="input-icon">
                    <img src="../icons/username.png" alt="name">
                    <input type="text" id="lastname" name="lastname" placeholder="Іванина">
                </div>
            </div>

            <div class="input-group">
                <label>Стать</label>
                <div class="radio-group">
                    <label class="radio-label">
                        <input type="radio" name="gender" value="male"> Чоловіча
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="gender" value="female"> Жіноча
                    </label>
                </div>
            </div>

            <div class="input-group">
                <label for="birthdate">Дата народження</label>
                <input type="date" id="birthdate" name="birthdate" class="date-input">
            </div>
        </div>

        <div class="form-block">
            <h2 class="block-title">Додатково</h2>

            <div class="input-group">
                <label class="checkbox-label">
                    <input type="checkbox" name="subscribe"> Підписатися на розсилку новин
                </label>
            </div>

            <div class="input-group">
                <label class="checkbox-label">
                    <input type="checkbox" name="agree" required> Погоджуюсь з правилами сервісу
                </label>
            </div>
        </div>

        <button type="submit" class="btn-register">Зареєструватися</button>
    </form>
</body>
</html>
