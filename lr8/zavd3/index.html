<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Email</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <span class="logo">📧 MY EMAIL</span>
        <span class="user">user@myemail.com</span>
    </header>
    <div class="container">
        <nav class="sidebar">
            <a href="#" class="active">📥 Incoming</a>
            <a href="#">📤 Outcoming</a>
            <a href="#">📝 Drafts</a>
            <a href="#">⚠️ Spam</a>
        </nav>
        <main class="emails">
            <div class="email">
                <span class="sender">me, Volodymyr</span>
                <span class="subject">Sequi, numquam dolore facere...</span>
                <span class="date">15 Jan</span>
            </div>
            <div class="email">
                <span class="sender">Francisco Puerte</span>
                <span class="subject">Enim laboriosam ipsam...</span>
                <span class="date">14 Jan</span>
            </div>
            <div class="email">
                <span class="sender">Sergio</span>
                <span class="subject">Nemo dolorem, hic officiis...</span>
                <span class="date">13 Jan</span>
            </div>
        </main>
    </div>
</body>
</html>
