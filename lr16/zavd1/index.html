<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Завдання 1 - Створення елементів</title>
    <style>
        body {
            font-family: Arial;
            background-color: #f5f5f5;
            padding: 20px;
        }
        h1 {
            text-align: center;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .add-btn {
            display: block;
            margin: 20px auto;
            padding: 12px 30px;
            font-size: 16px;
            background-color: #4a90d9;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        .add-btn:hover {
            background-color: #3a7bc8;
        }
    </style>
</head>
<body>
    <h1>Створення div-елементів</h1>

    <button class="add-btn" id="addBtn">Додати блок</button>

    <div class="container" id="container"></div>

    <script src="script.js"></script>
</body>
</html>
