<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Завдання 2 - Редагування вмісту</title>
    <style>
        body {
            font-family: Arial;
            background-color: #f5f5f5;
            padding: 20px;
        }
        h1 {
            text-align: center;
        }
        .content-box {
            max-width: 600px;
            margin: 30px auto;
            padding: 25px;
            background-color: white;
            border-radius: 8px;
            border: 1px solid #ddd;
            font-size: 18px;
            line-height: 1.6;
            text-align: center;
        }
        .edit-btn {
            display: block;
            margin: 20px auto;
            padding: 12px 30px;
            font-size: 16px;
            background-color: #4a90d9;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        .edit-btn:hover {
            background-color: #3a7bc8;
        }
    </style>
</head>
<body>
    <h1>Редагування вмісту div</h1>

    <div class="content-box" id="textBlock">
        Це початковий текст блоку. Натисніть кнопку щоб змінити його.
    </div>

    <button class="edit-btn" id="editBtn">Змінити текст</button>

    <script src="script.js"></script>
</body>
</html>
