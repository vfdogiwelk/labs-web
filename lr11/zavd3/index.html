<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Завдання 3 - Bootstrap Modal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <div class="container mt-4">
        <h1>Завдання 3 - Модальне вікно (Modal)</h1>

        <p>Натисніть кнопку нижче, щоб відкрити модальне вікно з формою.</p>

        <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#myModal">
            Відкрити форму
        </button>

        <div class="modal fade" id="myModal" tabindex="-1" aria-labelledby="modalLabel" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title" id="modalLabel">Форма реєстрації</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Закрити"></button>
                    </div>
                    <div class="modal-body">
                        <form>
                            <div class="mb-3">
                                <label for="inputName" class="form-label">Ім'я</label>
                                <input type="text" class="form-control" id="inputName" placeholder="Введіть ім'я">
                            </div>
                            <div class="mb-3">
                                <label for="inputEmail" class="form-label">Email</label>
                                <input type="email" class="form-control" id="inputEmail" placeholder="name@example.com">
                            </div>
                            <div class="mb-3">
                                <label for="inputPhone" class="form-label">Телефон</label>
                                <input type="tel" class="form-control" id="inputPhone" placeholder="+380...">
                            </div>
                            <div class="mb-3">
                                <label for="selectCity" class="form-label">Місто</label>
                                <select class="form-select" id="selectCity">
                                    <option selected>Оберіть місто</option>
                                    <option value="1">Київ</option>
                                    <option value="2">Львів</option>
                                    <option value="3">Одеса</option>
                                    <option value="4">Харків</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label for="inputMessage" class="form-label">Повідомлення</label>
                                <textarea class="form-control" id="inputMessage" rows="3" placeholder="Ваше повідомлення..."></textarea>
                            </div>
                            <div class="form-check mb-3">
                                <input class="form-check-input" type="checkbox" id="checkAgree">
                                <label class="form-check-label" for="checkAgree">
                                    Я погоджуюсь з умовами
                                </label>
                            </div>
                        </form>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Закрити</button>
                        <button type="button" class="btn btn-primary">Відправити</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
