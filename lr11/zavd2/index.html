<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Завдання 2 - Bootstrap Carousel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <div class="container mt-4">
        <h1>Завдання 2 - Карусель (Carousel)</h1>


        <div id="myCarousel" class="carousel slide mt-3" data-bs-ride="carousel">

            <div class="carousel-indicators">
                <button type="button" data-bs-target="#myCarousel" data-bs-slide-to="0" class="active"></button>
                <button type="button" data-bs-target="#myCarousel" data-bs-slide-to="1"></button>
                <button type="button" data-bs-target="#myCarousel" data-bs-slide-to="2"></button>
                <button type="button" data-bs-target="#myCarousel" data-bs-slide-to="3"></button>
                <button type="button" data-bs-target="#myCarousel" data-bs-slide-to="4"></button>
            </div>

            <div class="carousel-inner rounded">
                <div class="carousel-item active">
                    <img src="https://picsum.photos/800/400?random=1" class="d-block w-100" alt="Слайд 1">
                    <div class="carousel-caption d-none d-md-block">
                        <h5>Перший слайд</h5>
                        <p>Опис першого слайду</p>
                    </div>
                </div>
                <div class="carousel-item">
                    <img src="https://picsum.photos/800/400?random=2" class="d-block w-100" alt="Слайд 2">
                    <div class="carousel-caption d-none d-md-block">
                        <h5>Другий слайд</h5>
                        <p>Опис другого слайду</p>
                    </div>
                </div>
                <div class="carousel-item">
                    <img src="https://picsum.photos/800/400?random=3" class="d-block w-100" alt="Слайд 3">
                    <div class="carousel-caption d-none d-md-block">
                        <h5>Третій слайд</h5>
                        <p>Опис третього слайду</p>
                    </div>
                </div>
                <div class="carousel-item">
                    <img src="https://picsum.photos/800/400?random=4" class="d-block w-100" alt="Слайд 4">
                    <div class="carousel-caption d-none d-md-block">
                        <h5>Четвертий слайд</h5>
                        <p>Опис четвертого слайду</p>
                    </div>
                </div>
                <div class="carousel-item">
                    <img src="https://picsum.photos/800/400?random=5" class="d-block w-100" alt="Слайд 5">
                    <div class="carousel-caption d-none d-md-block">
                        <h5>П'ятий слайд</h5>
                        <p>Опис п'ятого слайду</p>
                    </div>
                </div>
            </div>

            <button class="carousel-control-prev" type="button" data-bs-target="#myCarousel" data-bs-slide="prev">
                <span class="carousel-control-prev-icon"></span>
                <span class="visually-hidden">Попередній</span>
            </button>
            <button class="carousel-control-next" type="button" data-bs-target="#myCarousel" data-bs-slide="next">
                <span class="carousel-control-next-icon"></span>
                <span class="visually-hidden">Наступний</span>
            </button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
