<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Форми в JavaScript</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <h1 class="header-title">Product Manager</h1>
        <button class="btn-create" id="openModal">Create Product</button>
    </header>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <button class="modal-close" id="closeModal">&times;</button>
            <h2 class="modal-title">Новий продукт</h2>
            <form class="product-form" id="productForm">
                <div class="form-group">
                    <label for="name">Назва</label>
                    <input type="text" id="name" placeholder="Введіть назву" required>
                    <span class="error" id="nameError"></span>
                </div>
                <div class="form-group">
                    <label for="description">Опис</label>
                    <textarea id="description" rows="3" placeholder="Введіть опис" required></textarea>
                    <span class="error" id="descriptionError"></span>
                </div>
                <div class="form-group">
                    <label for="price">Ціна (грн)</label>
                    <input type="number" id="price" placeholder="0" min="0" required>
                    <span class="error" id="priceError"></span>
                </div>
                <div class="form-group">
                    <label for="discount">Знижка (%)</label>
                    <input type="number" id="discount" placeholder="0" min="0" max="100" required>
                    <span class="error" id="discountError"></span>
                </div>
                <div class="form-group">
                    <label for="category">Категорія</label>
                    <select id="category" required>
                        <option value="">Оберіть категорію</option>
                        <option value="смартфони">Смартфони</option>
                        <option value="ноутбуки">Ноутбуки</option>
                        <option value="планшети">Планшети</option>
                        <option value="аромати">Аромати</option>
                    </select>
                    <span class="error" id="categoryError"></span>
                </div>
                <div class="form-group">
                    <label for="image">Зображення URL</label>
                    <input type="text" id="image" placeholder="https://example.com/image.jpg" required>
                    <span class="error" id="imageError"></span>
                </div>
                <button type="submit" class="btn-save">Save Product</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
